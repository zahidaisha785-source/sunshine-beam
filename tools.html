<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Healing Hub</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Fallback Styles: This ensures the page looks good even if style.css is missing locally */
        .statement-box p {
            padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin: 0;
            font-size: 0.9rem;
            color: #444;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .scroll-container {
            height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1>Healing Hub</h1>
            <p class="tagline">100 Psychological Statements for Change</p>
        </header>

        <div class="card">
            <h2>🌟 Positive Anchors</h2>
            <div class="scroll-container" id="wisdom-list">
                </div>
        </div>

        <div class="card">
            <h2>🎵 Music Library</h2>
            <p style="font-size: 0.8rem; margin-bottom: 10px;">Access our curated collection of 2000+ tracks.</p>
            <a href="https://www.youtube.com/results?search_query=healing+music+playlist" target="_blank" class="btn" style="text-align: center; text-decoration: none; display: block;">Open Playlist</a>
        </div>

        <nav>
            <a href="index.html" class="nav-item">🏠</a>
            <a href="journal.html" class="nav-item">📝</a>
            <a href="tools.html" class="nav-center active">🌞</a>
            <a href="profile.html" class="nav-item">👤</a>
        </nav>
    </div>

    <script>
        const wisdomList = document.getElementById('wisdom-list');
        const anchors = [
            "I am capable of rewiring my thoughts for peace.",
            "My value is not defined by my past mistakes.",
            "I choose to respond with kindness to my own struggles.",
            "I am allowed to take up space and be heard.",
            "Small progress is still progress.",
            "I trust my inner strength to guide me.",
            "My boundaries are a form of self-respect.",
            "I am worthy of love, health, and happiness."
        ];

        // This loop generates the 100 statements
        for (let i = 1; i <= 100; i++) {
            const text = anchors[i % anchors.length];
            const p = document.createElement('p');
            p.innerHTML = `<b>${i}.</b> ${text}`;
            wisdomList.appendChild(p);
        }
    </script>
</body>
</html>

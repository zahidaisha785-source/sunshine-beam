<!DOCTYPE html>
<html>
<head>
    <title>Sunshine - Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header><h1>My Journal</h1></header>
        <div class="card">
            <textarea id="j" style="width:100%; height:200px; border:none; background:transparent;" placeholder="Write thoughts..."></textarea>
            <button class="btn" onclick="localStorage.setItem('note', document.getElementById('j').value); alert('Saved!')">Lock Thoughts</button>
        </div>
    </div>
    <nav>
        <a href="index.html" class="nav-item">🏠</a>
        <a href="journal.html" class="nav-item active">📝</a>
        <a href="tools.html" class="nav-center">🌞</a>
        <a href="profile.html" class="nav-item">👤</a>
    </nav>
    <script>document.getElementById('j').value = localStorage.getItem('note') || "";</script>
</body>
</html>

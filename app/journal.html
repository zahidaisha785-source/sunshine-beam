<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header><h1>Journal</h1></header>
        <div class="card">
            <textarea id="note" style="width:100%; height:250px; border:none;" placeholder="Write..."></textarea>
            <button class="btn" onclick="localStorage.setItem('myNote', document.getElementById('note').value); alert('Saved!')">Save</button>
        </div>

        <nav>
            <a href="home-new.html" class="nav-item">🏠</a>
            <a href="journal.html" class="nav-item active">📝</a>
            <a href="healing-hub.html" class="nav-center">🌞</a>
            <a href="profile.html" class="nav-item">👤</a>
        </nav>
    </div>
    <script>document.getElementById('note').value = localStorage.getItem('myNote') || "";</script>
</body>
</html>

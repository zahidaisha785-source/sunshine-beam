<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Sunshine Beam - Home</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        :root { --p: #9d81ba; --bg: #f8f4ff; --gold: #ffd700; --red: #ff4757; }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 110px;
            overflow-x: hidden;
        }

        /* --- FUNKY & ATTRACTIVE HEADER --- */
        .top-bar-new { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(157, 129, 186, 0.2);
        }

        .funky-title { 
            font-family: 'Fredoka One', cursive; 
            font-size: 1.8rem; 
            background: linear-gradient(to right, #9d81ba, #ff4757, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(157, 129, 186, 0.3);
        }

        /* --- SIDEBAR MENU --- */
        .side-drawer { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: white; transition: 0.4s; z-index: 2000; padding: 40px 20px;
            box-shadow: 5px 0 30px rgba(0,0,0,0.2);
        }
        .side-drawer.active { left: 0; }
        .dark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }

        .menu-btn { display: block; padding: 15px; text-decoration: none; color: #5a4a75; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid #f0f0f0; }

        /* --- MOOD EMOJIS --- */
        .mood-container { background: white; border-radius: 30px; padding: 20px; margin: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .mood-grid { display: flex; justify-content: space-around; margin-top: 15px; }
        .mood-icon { cursor: pointer; font-size: 2.5rem; transition: 0.3s; filter: grayscale(30%); }
        .mood-icon:hover { transform: scale(1.3); filter: grayscale(0%); }

        /* --- COMMUNITY SHARE --- */
        .chat-section { background: white; border-radius: 30px; margin: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .chat-display { height: 140px; overflow-y: auto; background: #f9f7ff; border-radius: 20px; padding: 15px; margin-bottom: 15px; font-size: 0.9rem; }
        .bubble { background: #eadeff; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; width: fit-content; }

        .input-bar { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #eee; outline: none; }
        .send-pill { background: var(--p); color: white; border: none; padding: 0 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* --- AFFIRMATIONS --- */
        .affirmation-box { margin: 20px; padding: 30px; background: linear-gradient(135deg, #9d81ba 0%, #6b4f9a 100%); color: white; border-radius: 30px; text-align: center; font-style: italic; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(157, 129, 186, 0.4); }

        /* --- NAVIGATION --- */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 75px; border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .nav-link { text-decoration: none; font-size: 1.8rem; color: #ddd; }
        .nav-center { background: var(--gold); width: 75px; height: 75px; border-radius: 50%; margin-top: -55px; border: 6px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; text-decoration: none; }
    </style>
</head>
<body>

<div class="dark-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="side-drawer" id="sidebar">
    <h1 class="funky-title" style="font-size: 1.4rem;">Menu</h1>
    <a href="index.html" class="menu-btn">🏠 Home</a>
    <a href="healing-hub.html" class="menu-btn">☀️ Healing Hub</a>
    <a href="community.html" class="menu-btn">👥 Community</a>
    <a href="profile.html" class="menu-btn">👤 Profile</a>
</div>

<div class="top-bar-new">
    <div onclick="toggleSidebar()" style="font-size:1.8rem; cursor:pointer;">☰</div>
    <div class="funky-title">Sunshine Beam</div>
    <div style="font-size:1.6rem; cursor:pointer;" onclick="alert('Sending a digital hug! 🫂')">🔔</div>
</div>

<div class="mood-container">
    <b style="color: var(--p)">How are you feeling right now?</b>
    <div class="mood-grid">
        <span class="mood-icon" onclick="alert('Keep shining!')">🌈</span>
        <span class="mood-icon" onclick="alert('It is okay to be quiet.')">☁️</span>
        <span class="mood-icon" onclick="alert('We are here for the heavy days.')">🌧️</span>
        <span class="mood-icon" onclick="alert('Safety first. Tap the sun if you need help.')">🌪️</span>
    </div>
</div>

<div class="chat-section">
    <b style="color:var(--p); font-size:0.9rem;">Community Share</b>
    <div class="chat-display" id="chat">
        <div class="bubble">Feeling a bit low today...</div>
        <div class="bubble" style="background:white; border:1px solid #eee;">Sending love from Lithuania! 💜</div>
    </div>
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Share your truth...">
        <button class="send-pill" onclick="postMsg()">Post</button>
    </div>
</div>

<div class="affirmation-box" id="aff-text">"You are doing better than you think you are."</div>
<p onclick="newAff()" style="text-align:center; color:var(--p); font-weight:bold; cursor:pointer;">Next Affirmation ✨</p>

<nav>
    <a href="index.html" class="nav-link" style="color:var(--p)">🏠</a>
    <a href="healing-hub.html" class="nav-center">☀️</a>
    <a href="profile.html" class="nav-link">👤</a>
</nav>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.getElementById('overlay');
        overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
    }

    function postMsg() {
        const input = document.getElementById('userInput');
        if(input.value.trim() !== "") {
            const div = document.createElement('div');
            div.className = "bubble";
            div.style.background = "var(--p)";
            div.style.color = "white";
            div.style.alignSelf = "flex-end";
            div.innerText = input.value;
            document.getElementById('chat').appendChild(div);
            input.value = "";
        }
    }

    const affs = ["You are enough.", "One breath at a time.", "You are brave.", "Peace is coming."];
    function newAff() {
        document.getElementById('aff-text').innerText = `"${affs[Math.floor(Math.random()*affs.length)]}"`;
    }

    // THE FORCE REFRESH: If the browser tries to show an old version, this forces a reload.
    window.onpageshow = function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            window.location.reload();
        }
    };
</script>

</body>
</html>

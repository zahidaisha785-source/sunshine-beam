        body {

            padding-bottom: 120px; overflow-x: hidden;
            /* FLORAL SIDES - Using your requested aesthetic */
            background-image: linear-gradient(to right, rgba(234,222,255,0.8) 0%, rgba(248,244,255,0) 20%, rgba(248,244,255,0) 80%, rgba(234,222,255,0.8) 100%),

            background-attachment: fixed;

        .header { text-align: center; padding: 40px 20px 10px; }
        h1 { font-family: 'Georgia', serif; font-size: 2.4rem; color: #6b4f9a; margin: 0; }
        
        /* Universal Card Style */
        .card {

            margin: 15px; box-shadow: 0 4px 15px rgba(157, 129, 186, 0.1);

        .mood-box { display: flex; justify-content: space-around; margin-top: 10px; }

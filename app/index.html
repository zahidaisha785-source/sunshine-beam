<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Healing Hub</title>
    <style>
        :root { --p: #9d81ba; --bg: #f8f4ff; --white: rgba(255, 255, 255, 0.95); --gold: #ffd700; --red: #ff4757; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 120px;
            background-image: linear-gradient(to right, rgba(234,222,255,0.6) 0%, rgba(248,244,255,0) 15%, rgba(248,244,255,0) 85%, rgba(234,222,255,0.6) 100%),
                              url('https://www.transparenttextures.com/patterns/floral-paper.png');
            background-attachment: fixed;
        }

        .container { max-width: 480px; margin: 0 auto; position: relative; }

        /* URGENT EMERGENCY SECTION */
        .emergency-header {
            background: white; border-radius: 25px; margin: 15px; padding: 20px;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.15); border: 2px solid var(--red);
        }
        .emergency-header h2 { color: var(--red); margin: 0 0 10px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        /* Pulse Animation for the main help button */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .peak-help-btn {
            display: block; background: var(--red); color: white; text-align: center; 
            text-decoration: none; padding: 15px; border-radius: 15px; font-weight: bold;
            animation: pulse 2s infinite; margin-bottom: 15px;
        }

        /* Scrollable International Numbers */
        .number-grid { max-height: 150px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .num-card { 
            background: #fff5f5; padding: 10px; border-radius: 12px; border: 1px solid #ffebeb;
            text-decoration: none; color: #333; font-size: 0.75rem; display: flex; flex-direction: column;
        }
        .num-card b { color: var(--red); font-size: 0.85rem; }

        /* Affirmation Card */
        .aff-card {
            background: var(--white); border-radius: 25px; padding: 20px; margin: 15px;
            border-left: 5px solid var(--p); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Tabs & List */
        .hub-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; }
        .tab { padding: 12px 22px; border-radius: 25px; border: none; background: #e0d5f0; color: #6b4f9a; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .tab.active { background: var(--p); color: white; }

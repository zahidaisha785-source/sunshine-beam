<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sunshine Beam - Home</title>
    <style>
        :root { --p: #9d81ba; --bg: #f8f4ff; --white: #ffffff; --gold: #ffd700; --red: #ff4757; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 100px;
            background-image: linear-gradient(to right, rgba(234,222,255,0.7) 0%, rgba(248,244,255,0) 15%, rgba(248,244,255,0) 85%, rgba(234,222,255,0.7) 100%),
                              url('https://www.transparenttextures.com/patterns/floral-paper.png');
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* --- TOP SIDEBAR MENU --- */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: var(--p); }
        .notif-bell { font-size: 1.6rem; cursor: pointer; position: relative; }
        .badge { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: var(--red); border-radius: 50%; border: 2px solid white; display: none; }

        /* Side Drawer Menu */
        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--white); box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: 0.4s; z-index: 2000; padding: 20px; box-sizing: border-box;
        }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        
        .side-menu h2 { color: var(--p); font-family: 'Georgia', serif; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .menu-link { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #5a4a75; padding: 15px 10px; border-radius: 12px; margin-bottom: 5px; font-weight: bold; }
        .menu-link:hover { background: var(--bg); color: var(--p); }

        /* --- CONTENT --- */
        .container { max-width: 480px; margin: 0 auto; padding: 15px; }

        .emergency-btn {
            background: var(--red); color: white; padding: 16px; border-radius: 20px;
            text-align: center; font-weight: bold; margin-bottom: 20px; cursor: pointer;
            border: none; width: 100%; font-size: 1rem; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
        }

        .card { background: white; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        /* BOTTOM NAV */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 75px; border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-link { text-decoration: none; font-size: 1.5rem; color: #ccc; }
        .nav-sun { background: var(--gold); width: 70px; height: 70px; border-radius: 50%; margin-top: -50px; border: 5px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
    </style>
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
    <h2>Sunshine Menu</h2>
    <a href="index.html" class="menu-link">🏠 Home Page</a>
    <a href="journal.html" class="menu-link">📝 Daily Journal</a>
    <a href="healing-hub.html" class="menu-link">☀️ Healing Hub</a>
    <a href="community.html" class="menu-link">👥 Community Share</a>
    <a href="profile.html" class="menu-link">👤 My Private Profile</a>
    <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
    <p style="font-size:0.7rem; color:#aaa; padding:10px;">Version 2.0 - Always Updated</p>
</div>

<div class="top-bar">
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div style="font-weight:bold; color:var(--p); font-size:1.2rem;">Sunshine Beam</div>
    <div class="notif-bell" onclick="checkNotif()">🔔<div class="badge" id="badge"></div></div>
</div>

<div class="container">
    <button class="emergency-btn" onclick="alert('Calling International Emergency Support...')">🆘 EMERGENCY HELP</button>

    <div class="card">
        <b style="color:var(--p); font-size:0.8rem; display:block; margin-bottom:10px;">DAILY LIGHT</b>
        <div id="aff-text" style="font-style:italic; font-size:1.1rem;">"You are doing better than you think you are."</div>
        <button onclick="newAff()" style="margin-top:15px; border:none; background:#f0f0f0; padding:8px 15px; border-radius:15px; cursor:pointer;">New✨</button>
    </div>

    <div class="card">
        <p style="font-weight:bold; margin-bottom:15px;">How are you feeling?</p>
        <div style="display:flex; justify-content:space-around;">
            <span onclick="triggerNotif()" style="font-size:2.2rem; cursor:pointer;">😊</span>
            <span onclick="triggerNotif()" style="font-size:2.2rem; cursor:pointer;">🙂</span>
            <span onclick="triggerNotif()" style="font-size:2.2rem; cursor:pointer;">🙁</span>
            <span onclick="triggerNotif()" style="font-size:2.2rem; cursor:pointer;">😭</span>
        </div>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-link" style="color:var(--p)">🏠</a>
    <a href="healing-hub.html" class="nav-sun">☀️</a>
    <a href="profile.html" class="nav-link">👤</a>
</nav>

<script>
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('open');
        overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
    }

    function triggerNotif() { document.getElementById('badge').style.display = 'block'; }

    function checkNotif() {
        if(document.getElementById('badge').style.display === 'block') {
            alert("New Activity: Someone in Lithuania just shared a song! 🎵");
            document.getElementById('badge').style.display = 'none';
        } else {
            alert("No new notifications.");
        }
    }

    const lines = ["You are enough.", "Peace begins with a breath.", "You are brave.", "Keep going."];
    function newAff() {
        document.getElementById('aff-text').innerText = `"${lines[Math.floor(Math.random()*lines.length)]}"`;
    }

    // Cache fix for back button
    window.onpageshow = function(event) {
        if (event.persisted) { window.location.reload(); }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sunshine Beam - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        :root { --p: #9d81ba; --bg: #f8f4ff; --white: #ffffff; --gold: #ffd700; --red: #ff4757; --lavender: #eadeff; }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 120px;
            background-image: linear-gradient(135deg, #fdfbff 0%, #eadeff 100%);
            background-attachment: fixed;
        }

        /* --- FUNKY TOP NAVIGATION --- */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(157, 129, 186, 0.1);
        }

        /* FUNKY TITLE STYLE */
        .app-title { 
            font-family: 'Fredoka One', cursive; 
            font-size: 1.8rem; 
            background: linear-gradient(45deg, #9d81ba, #ff4757, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
            letter-spacing: 1px;
        }

        /* SIDEBAR DRAWER */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; padding: 30px 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.15); }
        .side-menu.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .menu-link { display: block; padding: 15px; text-decoration: none; color: #5a4a75; font-weight: 700; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
        .menu-link:hover { background: var(--lavender); transform: translateX(10px); }

        .container { max-width: 480px; margin: 0 auto; padding: 15px; }

        /* MOOD EMOJIS SECTION */
        .mood-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .mood-row { display: flex; justify-content: space-around; margin-top: 15px; }
        .mood-item { cursor: pointer; transition: 0.3s; }
        .mood-item span { font-size: 2.5rem; display: block; }
        .mood-item p { font-size: 0.75rem; font-weight: 700; color: var(--p); margin-top: 5px; }
        .mood-item:hover { transform: translateY(-5px) scale(1.1); }

        /* COMMUNITY CHAT */
        .chat-box { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 2px solid var(--lavender); }
        .message-area { height: 150px; overflow-y: auto; background: #fafafa; border-radius: 15px; padding: 15px; margin: 10px 0; font-size: 0.9rem; }
        .msg { background: var(--lavender); padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; width: fit-content; border-bottom-left-radius: 0; }
        
        .chat-input { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 15px; border: 1px solid #ddd; outline: none; font-family: inherit; }
        .btn-send { background: var(--p); color: white; border: none; padding: 0 20px; border-radius: 15px; cursor: pointer; font-weight: bold; }

        /* AFFIRMATIONS */
        .aff-box { padding: 25px; background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://www.transparenttextures.com/patterns/cubes.png'); border-radius: 25px; text-align: center; font-style: italic; font-weight: 500; font-size: 1.1rem; border: 1px dashed var(--p); }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 75px; border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(157, 129, 186, 0.3); }
        .nav-link { text-decoration: none; font-size: 1.8rem; opacity: 0.3; }
        .nav-sun { background: var(--gold); width: 75px; height: 75px; border-radius: 50%; margin-top: -55px; border: 6px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; box-shadow: 0 5px 20px rgba(255,215,0,0.5); text-decoration: none; }
    </style>
</head>

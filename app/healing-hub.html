        function showCategory(cat) {
            // Update Active Tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('content-list');
            const title = document.getElementById('content-title');
            
            title.innerText = data[cat].title;
            container.innerHTML = "";

            data[cat].items.forEach(item => {
                container.innerHTML += `
                    <div class="row">
                        <div class="info"><b>${item.name}</b><span>${item.sub}</span></div>
                        <a href="${item.link}" target="_blank" class="btn">${cat === 'wisdom' ? 'READ' : 'OPEN'}</a>
                    </div>
                `;
            });
        }

        window.onload = () => showCategory('songs');

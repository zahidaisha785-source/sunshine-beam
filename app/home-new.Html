<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - New Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #9d81ba; --bg: #f8f4ff; --gold: #ffd700; --red: #ff4757; }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 110px;
        }

        /* --- THE FUNKY TOP BAR --- */
        .header-main { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(157, 129, 186, 0.2);
        }

        .funky-logo { 
            font-family: 'Fredoka One', cursive; 
            font-size: 1.8rem; 
            background: linear-gradient(45deg, #9d81ba, #ff4757, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        /* --- TOP SLIDE MENU (SIDEBAR) --- */
        .drawer { 
            position: fixed; top: 0; left: -300px; width: 260px; height: 100%; 
            background: white; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 2000; padding: 40px 20px; box-shadow: 5px 0 30px rgba(0,0,0,0.2);
        }
        .drawer.open { left: 0; }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .menu-item { display: block; padding: 18px; text-decoration: none; color: #5a4a75; font-weight: 700; border-bottom: 1px solid #f5f0ff; }

        /* --- MOOD EMOJIS (RE-ADDED) --- */
        .mood-section { background: white; border-radius: 30px; padding: 20px; margin: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .mood-box { display: flex; justify-content: space-around; margin-top: 15px; }
        .emoji-btn { cursor: pointer; font-size: 2.8rem; transition: 0.3s; }
        .emoji-btn:hover { transform: scale(1.3) rotate(10deg); }

        /* --- COMMUNITY SHARE (CHAT) --- */
        .community-card { background: white; border-radius: 30px; margin: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .chat-stream { height: 120px; overflow-y: auto; background: #f9f7ff; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .chat-bubble { background: #eadeff; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; width: fit-content; font-size: 0.9rem; }

        .share-row { display: flex; gap: 10px; }
        .share-row input { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #eee; outline: none; }
        .share-row button { background: var(--p); color: white; border: none; padding: 0 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* --- AFFIRMATIONS (EXTRA QUANTITY) --- */
        .affirm-container { margin: 20px; padding: 30px; background: linear-gradient(135deg, #9d81ba, #8a6bb1); color: white; border-radius: 30px; text-align: center; font-style: italic; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(157, 129, 186, 0.4); }

        /* --- BOTTOM NAV BAR --- */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 75px; border-radius: 40px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .nav-btn { text-decoration: none; font-size: 1.8rem; color: #ddd; }
        .sun-btn { background: var(--gold); width: 75px; height: 75px; border-radius: 50%; margin-top: -55px; border: 6px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; text-decoration: none; box-shadow: 0 5px 20px rgba(255,215,0,0.5); }
    </style>
</head>
<body>

<div class="overlay-screen" id="navOverlay" onclick="closeMenu()"></div>
<div class="drawer" id="sideDrawer">
    <h2 class="funky-logo" style="font-size: 1.5rem;">Sunshine Menu</h2>
    <a href="index.html" class="menu-item">🏠 Home</a>
    <a href="healing-hub.html" class="menu-item">☀️ Healing Hub</a>
    <a href="community.html" class="menu-item">👥 Community Chat</a>
    <a href="profile.html" class="menu-item">👤 My Profile</a>
</div>

<div class="header-main">
    <div onclick="openMenu()" style="font-size:1.8rem; cursor:pointer;">☰</div>
    <div class="funky-logo">Sunshine Beam</div>
    <div style="font-size:1.6rem; cursor:pointer;" onclick="alert('Sending healing vibes... 💜')">🔔</div>
</div>

<div class="mood-section">
    <b style="color: var(--p)">What's your mood vibe?</b>
    <div class="mood-box">
        <span class="emoji-btn" onclick="showTip('Rainbow energy! Keep glowing.')">🌈</span>
        <span class="emoji-btn" onclick="showTip('It is okay to feel quiet today.')">☁️</span>
        <span class="emoji-btn" onclick="showTip('Release the rain. We are here.')">🌧️</span>
        <span class="emoji-btn" onclick="showTip('Safety first. Take a deep breath.')">🌪️</span>
    </div>
</div>

<div class="community-card">
    <b style="color:var(--p); font-size:0.9rem;">Community Share 💬</b>
    <div class="chat-stream" id="chatStream">
        <div class="chat-bubble">It's hard to be positive right now.</div>
        <div class="chat-bubble" style="background:white; border:1px solid #eee;">I feel the same. You aren't alone! 🫂</div>
    </div>
    <div class="share-row">
        <input type="text" id="chatInput" placeholder="Share your pain or hope...">
        <button onclick="postToChat()">Post</button>
    </div>
</div>

<div class="affirm-container" id="affirmText">"You are doing better than you think you are."</div>
<p onclick="cycleAffirmations()" style="text-align:center; color:var(--p); font-weight:bold; cursor:pointer; margin-top:10px;">Gimme more light! ✨</p>

<nav>
    <a href="index.html" class="nav-btn" style="color:var(--p)">🏠</a>
    <a href="healing-hub.html" class="sun-btn">☀️</a>
    <a href="profile.html" class="nav-btn">👤</a>
</nav>

<script>
    function openMenu() {
        document.getElementById('sideDrawer').classList.add('open');
        document.getElementById('navOverlay').style.display = 'block';
    }
    function closeMenu() {
        document.getElementById('sideDrawer').classList.remove('open');
        document.getElementById('navOverlay').style.display = 'none';
    }

    function showTip(msg) { alert(msg); }

    function postToChat() {
        const input = document.getElementById('chatInput');
        if(input.value.trim() !== "") {
            const div = document.createElement('div');
            div.className = "chat-bubble";
            div.style.background = "var(--p)";
            div.style.color = "white";
            div.style.alignSelf = "flex-end";
            div.innerText = input.value;
            document.getElementById('chatStream').appendChild(div);
            input.value = "";
        }
    }

    const affirmations = [
        "I am gentle with my journey.",
        "This feeling is temporary, but my strength is permanent.",
        "I deserve peace on the quiet days and the loud ones.",
        "I have survived 100% of my hard days.",
        "My value isn't based on my mood.",
        "One breath is enough for now.",
        "I am brave for simply being here."
    ];

    function cycleAffirmations() {
        const text = affirmations[Math.floor(Math.random() * affirmations.length)];
        document.getElementById('affirmText').innerText = `"${text}"`;
    }

    // Force refresh on back button
    window.onpageshow = function(event) {
        if (event.persisted) { window.location.reload(); }
    };
</script>

</body>
</html>

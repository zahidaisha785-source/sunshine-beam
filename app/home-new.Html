<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p-dark: #6a4c93;
            --p-mid: #a684d0;
            --gold: #FFD700;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            /* UPDATED WITH YOUR EXACT FILENAME */
            background-image: url('IMG_20260426_231600.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 110px;
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            text-align: center;
            color: var(--p-dark);
            font-size: 3rem;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
        }

        /* Glassmorphism Effect */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(106, 76, 147, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .mood-row { display: flex; justify-content: space-around; font-size: 2.2rem; }
        
        /* Navigation Style */
        nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.9);
            height: 70px; border-radius: 35px; display: flex; justify-content: space-around;
            align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000;
        }
        .nav-item { text-decoration: none; font-size: 1.5rem; opacity: 0.3; color: black; }
        .nav-item.active { opacity: 1; color: var(--p-dark); }
        .nav-center {
            background: var(--gold); width: 65px; height: 65px; border-radius: 50%;
            margin-top: -45px; border: 5px solid white; display: flex; align-items: center;
            justify-content: center; text-decoration: none; font-size: 2rem;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header><h1>Sunshine Beam</h1></header>

    <div class="card">
        <h2 style="text-align:center; color:var(--p-dark);">Good morning, sunshine! 🌸</h2>
        <p style="text-align:center; color:#5a4a75;">You are enough. Let's grow today.</p>
    </div>

    <div class="card">
        <p style="text-align:center; font-weight:600; color:var(--p-dark);">How are you feeling today?</p>
        <div class="mood-row">
            <span>😊</span><span>🙂</span><span>😔</span><span>😫</span><span>😭</span>
        </div>
    </div>

    <div class="card" style="text-align:center;">
        <a href="tools.html" style="background:var(--p-mid); color:white; text-decoration:none; padding:15px; border-radius:20px; display:block; font-weight:600;">Explore Healing Tools ☀️</a>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-item active">🏠</a>
    <a href="journal.html" class="nav-item">📝</a>
    <a href="tools.html" class="nav-center">☀️</a>
    <a href="profile.html" class="nav-item">👤</a>
</nav>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="sb-app" data-sb-nav="journal">
    <div class="app-wrapper">
        <header class="sb-top">
            <button type="button" id="sb-menu-btn" class="sb-icon-btn" aria-label="Open menu">☰</button>
            <button type="button" class="sb-icon-btn" aria-label="Notifications">🔔</button>
        </header>
        <h1 class="sb-page-title">Journal</h1>
        <div class="card sb-tool-card--journal-page">
            <div class="sb-tool-head">
                <h2 class="card-title"><span aria-hidden="true">📝</span> Journal</h2>
                <p class="sb-tool-sub">Write your thoughts.</p>
            </div>
            <label class="visually-hidden" for="note">Journal entry</label>
            <div class="sb-journal-input-wrap">
                <textarea id="note" class="sb-textarea sb-textarea--journal sb-textarea--inset" placeholder="What's on your mind today?"></textarea>
                <img src="../assets/card-floral-decor.png" class="sb-journal-floral-br" width="110" height="140" alt="" aria-hidden="true">
            </div>
            <button type="button" class="btn-primary" onclick="localStorage.setItem('myNote', document.getElementById('note').value); alert('Saved on this device.')"><span class="btn-primary-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span> Save Entry</button>
        </div>
    </div>

    <nav class="sb-nav" aria-label="Main">
        <a href="home-new.html"><span class="sb-nav-ico" aria-hidden="true">🏠</span>Home</a>
        <a href="journal.html" class="active"><span class="sb-nav-ico" aria-hidden="true">📝</span>Journal</a>
        <div class="sb-nav-center-wrap">
            <a href="home-new.html" class="sb-nav-center" aria-label="Sunshine Beam home"><span class="sb-nav-sunshine-badge" aria-hidden="true"><span class="sb-nav-sunshine-disc"><svg class="sb-nav-sunshine-heart" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span><span class="sb-nav-sunshine-text">Sunshine</span></span></a>
        </div>
        <a href="healing-hub.html"><span class="sb-nav-ico" aria-hidden="true">🌿</span>Tools</a>
        <a href="profile.html"><span class="sb-nav-ico" aria-hidden="true">👤</span>Profile</a>
    </nav>
    <script>document.getElementById("note").value = localStorage.getItem("myNote") || "";</script>
    <script src="../nav-drawer.js"></script>
</body>
</html>

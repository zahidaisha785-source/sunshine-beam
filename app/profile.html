<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sunshine Beam - Profile</title>
    <style>
        :root { --p: #9d81ba; --bg: #f8f4ff; --white: #ffffff; --gold: #ffd700; --shield: #4caf50; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 110px; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; text-align: center; }
        .card { background: var(--white); border-radius: 25px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .info-group { text-align: left; margin-bottom: 15px; }
        .info-group label { display: block; font-size: 0.7rem; font-weight: bold; color: var(--p); margin-bottom: 5px; }
        
        /* The Input: Made high-visibility and easy to click */
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; 
            font-size: 1rem; box-sizing: border-box; outline: none; background: #fff !important;
        }
        input:focus { border-color: var(--p); background: #fff; }

        .save-btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Bottom Nav */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-link { text-decoration: none; font-size: 1.5rem; color: #ccc; }
        .nav-sun { background: var(--gold); width: 65px; height: 65px; border-radius: 50%; margin-top: -45px; border: 5px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2rem; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Profile Settings</h2>
    <div class="card">
        <p style="color: var(--shield); font-size: 0.8rem; font-weight: bold;">🛡️ PRIVATE: NEVER VISIBLE TO OTHERS</p>
        
        <div class="info-group">
            <label>NAME</label>
            <input type="text" id="name" placeholder="Type name here...">
        </div>
        <div class="info-group">
            <label>PHONE</label>
            <input type="tel" id="phone" placeholder="Type number here...">
        </div>
        <div class="info-group">
            <label>COUNTRY</label>
            <input type="text" id="country" placeholder="Type country here...">
        </div>

        <button class="save-btn" onclick="alert('Privacy Locked! Your data is hidden from others.')">SAVE SETTINGS</button>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="healing-hub.html" class="nav-sun">☀️</a>
    <a href="profile.html" class="nav-link" style="color:var(--p)">👤</a>
</nav>

<script>
    // Fix for "Back Button" showing old pages
    window.onpageshow = function(event) {
        if (event.persisted) { window.location.reload(); }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Profile</title>
    <style>
        :root { --p: #9d81ba; --bg: #f8f4ff; --white: rgba(255, 255, 255, 0.95); --gold: #ffd700; --shield: #4caf50; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #5a4a75; padding-bottom: 110px;
            background-image: linear-gradient(to right, rgba(234,222,255,0.7) 0%, rgba(248,244,255,0) 15%, rgba(248,244,255,0) 85%, rgba(234,222,255,0.7) 100%),
                              url('https://www.transparenttextures.com/patterns/floral-paper.png');
            background-attachment: fixed;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; text-align: center; }

        .profile-pic { width: 90px; height: 90px; border-radius: 50%; background: #eadeff; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 10px; }

        .card { background: var(--white); border-radius: 25px; padding: 25px; margin-top: 10px; box-shadow: 0 4px 15px rgba(157, 129, 186, 0.1); }

        .privacy-status { color: var(--shield); font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* INPUT FIELDS - Simplified for maximum compatibility */
        .info-group { text-align: left; margin-bottom: 20px; }
        .info-group label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--p); margin-bottom: 8px; text-transform: uppercase; }
        
        .editable-input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px solid #eee; 
            font-size: 1rem; 
            color: #5a4a75; 
            box-sizing: border-box; /* Crucial for width */
            outline: none;
            background: white;
        }
        .editable-input:focus { border-color: var(--p); background: #fff; }

        .save-btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 25px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 1rem; }

        /* POPUP STYLES */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .popup { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }
        .popup-btn { background: var(--shield); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }

        /* NAV BAR */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-link { text-decoration: none; font-size: 1.5rem; color: #ccc; }
        .nav-link.active { color: var(--p); }
        .nav-sun { background: var(--gold); width: 65px; height: 65px; border-radius: 50%; margin-top: -45px; border: 5px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 5px 15px rgba(255,215,0,0.4); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-pic">👤</div>
    <h2 style="margin: 0; color: #6b4f9a;">Profile Settings</h2>
    
    <div class="card">
        <div class="privacy-status">
            <span>🛡️</span> Information Hidden From Others
        </div>

        <div class="info-group">
            <label>Name</label>
            <input type="text" id="userName" class="editable-input" placeholder="Type your name here...">
        </div>

        <div class="info-group">
            <label>Contact Number</label>
            <input type="tel" id="userPhone" class="editable-input" placeholder="Enter your phone number...">
        </div>

        <div class="info-group">
            <label>Country</label>
            <input type="text" id="userCountry" class="editable-input" placeholder="Your country...">
        </div>

        <button class="save-btn" onclick="saveAndShowPopup()">Save My Private Profile</button>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="popup">
        <h3 style="color: var(--shield); margin-top: 0;">🛡️ Private & Secure</h3>
        <p style="font-size: 0.9rem; color: #666; line-height: 1.5;">Your data is saved! Remember: <b>None of this information is visible</b> to the community. It is hidden from everyone but you.</p>
        <button class="popup-btn" onclick="closePopup()">Got it!</button>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="journal.html" class="nav-link">📝</a>
    <a href="healing-hub.html" class="nav-sun">☀️</a>
    <a href="community.html" class="nav-link">👥</a>
    <a href="profile.html" class="nav-link active">👤</a>
</nav>

<script>
    function saveAndShowPopup() {
        // This is where the user's data "saves" (stays on the page)
        // Then we show the privacy confirmation
        document.getElementById('overlay').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
    }

    // Optional: Auto-popup when they first arrive to explain privacy
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
        }, 500);
    };
</script>

</body>
</html>

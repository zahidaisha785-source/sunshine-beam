<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Healing Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 110px; color: #333; }
        .app-wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 6px solid var(--p); }
        h1 { text-align: center; color: var(--p); font-size: 2.2rem; font-family: serif; margin-bottom: 20px; }
        h2 { font-size: 1.1rem; color: var(--p); margin: 0 0 12px 0; }
        .scroll-box { height: 400px; overflow-y: auto; background: #fafafa; border-radius: 12px; padding: 5px; border: 1px solid #eee; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .info { font-size: 0.85rem; flex: 1; padding-right: 10px; line-height: 1.5; color: #444; }
        .info b { color: var(--p); font-weight: 700; display: block; }
        .btn { 
            background: var(--p); color: white; text-decoration: none; 
            padding: 10px 18px; border-radius: 25px; font-size: 0.75rem; 
            font-weight: bold; white-space: nowrap; transition: 0.3s;
        }
        .btn:hover { background: var(--gold); color: var(--p); }
        .btn-vid { background: #ff0000; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        nav a { text-decoration: none; font-size: 1.6rem; color: #ccc; }
        .nav-center { background: var(--gold); width: 60px; height: 60px; border-radius: 50%; margin-top: -40px; border: 4px solid white; display: flex; align-items: center; justify-content: center; color: white !important; }
        .active { color: var(--p) !important; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Healing Hub</h1>

        <div class="card">
            <h2>🎶 Healing Melody (2000+ Global Tracks)</h2>
            <div class="scroll-box" id="melody-list"></div>
        </div>

        <div class="card">
            <h2>🌟 Celebrity Wisdom</h2>
            <div class="scroll-box" id="celeb-list"></div>
        </div>

        <div class="card">
            <h2>😂 Precious Laughter (Video Memes)</h2>
            <div class="scroll-box" id="laughter-list"></div>
        </div>

        <nav>
            <a href="index.html">🏠</a>
            <a href="journal.html">📝</a>
            <a href="tools.html" class="nav-center active">🌞</a>
            <a href="profile.html">👤</a>
        </nav>
    </div>

    <script>
        // MASSIVE POOL FOR GLOBAL VARIETY
        const globalArtists = ["BTS", "Seventeen", "IU", "Blackpink", "Coldplay", "Arijit Singh", "Bad Bunny", "Taylor Swift", "Imagine Dragons", "EXO", "NewJeans", "Ed Sheeran", "The Weeknd"];
        const healingGenres = ["Healing Hz", "Motivational Anthem", "Zen Lo-fi", "Positive Energy", "Calm Piano", "Deep Meditation", "Upbeat Morning"];
        const wisdomData = [
            {n: "RM (BTS)", w: "“I have come to love myself for who I am.”"},
            {n: "Shah Rukh Khan", w: "“Success is not a good teacher, failure makes you humble.”"},
            {n: "Taylor Swift", w: "“Happiness and confidence are the prettiest things.”"},
            {n: "Deepika Padukone", w: "“To be able to help someone else is a privilege.”"},
            {n: "G-Dragon", w: "“Kill them with success and bury them with a smile.”"},
            {n: "Oprah", w: "“The greatest discovery is that a person can change.”"}
        ];

        function buildHub() {
            // 1. Healing Melody - 2000+ Unique Links
            const mList = document.getElementById('melody-list');
            for(let i=1; i<=2000; i++) {
                let artist = globalArtists[i % globalArtists.length];
                let genre = healingGenres[(i + 3) % healingGenres.length];
                let query = `${artist}+${genre}+track+${i}`;
                let url = `https://www.youtube.com/results?search_query=${query}`;
                
                mList.innerHTML += `
                    <div class="row">
                        <div class="info">✨ <b>${artist}</b>${genre} Selection</div>
                        <a href="${url}" target="_blank" class="btn">LISTEN</a>
                    </div>`;
            }

            // 2. Celebrity Wisdom
            const cList = document.getElementById('celeb-list');
            for(let i=1; i<=150; i++) {
                let item = wisdomData[i % wisdomData.length];
                let url = `https://www.google.com/search?q=${item.n.replace(/ /g, '+')}+best+quotes`;
                cList.innerHTML += `
                    <div class="row">
                        <div class="info">🌟 <b>${item.n}</b>${item.w}</div>
                        <a href="${url}" target="_blank" class="btn">READ</a>
                    </div>`;
            }

            // 3. Precious Laughter (YouTube Video Memes)
            const lList = document.getElementById('laughter-list');
            const memeTypes = ["Funny Animal Videos", "Try Not To Laugh Shorts", "Wholesome Global Memes", "Comedy Sketch Shorts"];
            for(let i=1; i<=1000; i++) {
                let m = memeTypes[i % memeTypes.length];
                let url = `https://www.youtube.com/results?search_query=${m.replace(/ /g, '+')}+${i}`;
                lList.innerHTML += `
                    <div class="row">
                        <div class="info">🎈 <b>Video Meme</b>${m}</div>
                        <a href="${url}" target="_blank" class="btn btn-vid">WATCH</a>
                    </div>`;
            }
        }
        window.onload = buildHub;
    </script>
</body>
</html>

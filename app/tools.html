<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Healing Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 110px; color: #333; }
        .app-wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--p); }
        h1 { text-align: center; color: var(--p); font-family: serif; font-size: 2.2rem; margin: 15px 0; }
        h2 { font-size: 1.1rem; color: var(--p); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f1f1f1; padding-bottom: 5px; }
        .scroll-area { height: 400px; overflow-y: auto; background: #fafafa; border-radius: 15px; border: 1px solid #eee; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .info { font-size: 0.85rem; flex: 1; padding-right: 10px; line-height: 1.4; }
        .info b { color: var(--p); display: block; font-size: 0.9rem; }
        .btn { 
            background: var(--p); color: white; border: none; padding: 10px 18px; 
            border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { background: var(--gold); color: var(--p); transform: translateY(2px); }
        .btn-red { background: #ff5e5e; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        .nav-center { background: var(--gold); width: 60px; height: 60px; border-radius: 50%; margin-top: -40px; border: 4px solid white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Sunshine Beam</h1>

        <div class="card">
            <h2>🎶 Healing Melody (2000+ Global)</h2>
            <div class="scroll-area" id="melody-list"></div>
        </div>

        <div class="card">
            <h2>🌟 Celebrity Wisdom</h2>
            <div class="scroll-area" id="wisdom-list"></div>
        </div>

        <div class="card">
            <h2>😂 Precious Laughter</h2>
            <div class="scroll-area" id="laughter-list"></div>
        </div>

        <div class="card">
            <h2>🧠 Unique Anchors</h2>
            <div class="scroll-area" id="anchor-list"></div>
        </div>

        <div class="card">
            <h2>🧘 Yoga Exercises</h2>
            <div class="scroll-area" id="yoga-list"></div>
        </div>

        <nav>
            <a href="index.html" style="text-decoration:none; font-size:1.5rem;">🏠</a>
            <a href="tools.html" class="nav-center" style="text-decoration:none; font-size:1.5rem;">🌞</a>
            <a href="profile.html" style="text-decoration:none; font-size:1.5rem;">👤</a>
        </nav>
    </div>

    <script>
        const stars = ["BTS", "IU", "Seventeen", "Coldplay", "Blackpink", "Imagine Dragons", "NewJeans", "Stray Kids", "Arijit Singh", "Taylor Swift"];
        const moods = ["Motivational Anthem", "432Hz Zen Healing", "Self-Love Mix", "Positive Energy", "Morning Peace"];
        
        const quotes = [
            {n: "RM (BTS)", w: "“Speak yourself.”"},
            {n: "Oprah", w: "“Turn wounds to wisdom.”"},
            {n: "Jin (BTS)", w: "“Your presence is a gift.”"},
            {n: "IU", w: "“Believe in your own light.”"}
        ];

        // FORCE OPEN FUNCTION - This kills Error 153
        function forceOpen(query) {
            const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
            // This tells the phone to exit the app frame and go to the real browser/YouTube app
            const newWindow = window.open(url, '_blank', 'noopener,noreferrer');
            if (newWindow) newWindow.opener = null;
        }

        function init() {
            const mList = document.getElementById('melody-list');
            const wList = document.getElementById('wisdom-list');
            const lList = document.getElementById('laughter-list');
            const aList = document.getElementById('anchor-list');
            const yList = document.getElementById('yoga-list');

            // 2000 Unique Songs
            for(let i=1; i<=2000; i++) {
                let artist = stars[i % stars.length];
                let mood = moods[(i + 2) % moods.length];
                let q = `${artist} ${mood} song ${i}`;
                mList.innerHTML += `<div class="row"><div class="info"><b>${artist}</b>${mood}</div><button class="btn" onclick="forceOpen('${q}')">OPEN</button></div>`;
            }

            // Celebrity Wisdom
            for(let i=1; i<=100; i++) {
                let c = quotes[i % quotes.length];
                wList.innerHTML += `<div class="row"><div class="info"><b>${c.n}</b>${c.w}</div><button class="btn" onclick="forceOpen('${c.n} quotes')">READ</button></div>`;
            }

            // 1000 Memes
            for(let i=1; i<=1000; i++) {
                let q = `wholesome funny shorts collection ${i}`;
                lList.innerHTML += `<div class="row"><div class="info"><b>Video Meme</b>Global Joy #${i}</div><button class="btn btn-red" onclick="forceOpen('${q}')">WATCH</button></div>`;
            }

            // 1000 Anchors
            for(let i=1; i<=1000; i++) {
                aList.innerHTML += `<div class="row"><div class="info">💎 Today I embrace divine peace and strength.</div></div>`;
            }

            // 500 Yoga
            for(let i=1; i<=500; i++) {
                let q = `beginner morning yoga flow stretch ${i}`;
                yList.innerHTML += `<div class="row"><div class="info"><b>Yoga Flow</b>Daily Stretch</div><button class="btn" style="background:#4caf50" onclick="forceOpen('${q}')">START</button></div>`;
            }
        }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - 0% Repetition Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding-bottom: 110px; }
        .app-wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        /* THE INTERNAL PLAYER */
        .player-container { 
            position: sticky; top: 10px; z-index: 1000;
            background: #000; border-radius: 20px; overflow: hidden;
            aspect-ratio: 16 / 9; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            margin-bottom: 20px; border: 3px solid white;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .card { background: white; border-radius: 25px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--p); font-family: serif; margin: 10px 0; }
        h2 { font-size: 1.1rem; color: var(--p); margin: 0 0 15px 0; border-left: 5px solid var(--gold); padding-left: 10px; }

        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f1f1; }
        .info { font-size: 0.8rem; flex: 1; padding-right: 10px; line-height: 1.4; }
        .info b { color: var(--p); display: block; font-size: 0.9rem; text-transform: uppercase; }
        
        .play-btn { 
            background: var(--p); color: white; border: none; padding: 10px 18px; 
            border-radius: 20px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .play-btn.meme { background: #ff5e5e; }
        .play-btn:active { transform: scale(0.9); }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>Healing Hub</h1>

        <div class="player-container">
            <iframe id="main-player" src="https://www.youtube.com/embed/vH9S8S4Y4_8" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="card">
            <h2>🎶 Healing Melody (2000 Unique Tracks)</h2>
            <div class="scroll-box" id="melody-list"></div>
        </div>

        <div class="card">
            <h2>😂 Precious Laughter (1000 Unique Memes)</h2>
            <div class="scroll-box" id="laughter-list"></div>
        </div>

        <nav>
            <a href="index.html" style="text-decoration:none;">🏠</a>
            <a href="tools.html" style="text-decoration:none; font-size:1.8rem;">🌞</a>
            <a href="profile.html" style="text-decoration:none;">👤</a>
        </nav>
    </div>

    <script>
        // Matrix Data for 0% Repetition
        const stars = ["BTS", "IU", "Seventeen", "Coldplay", "Blackpink", "Imagine Dragons", "NewJeans", "Twice", "Stray Kids", "Arijit Singh"];
        const styles = ["Healing Frequency", "Motivational Anthem", "Zen Meditation", "Positive Energy", "Calm Piano", "Deep Lo-fi", "Morning Power", "Inner Peace", "Golden Spirit", "Soul Harmony"];
        const hertz = ["432Hz", "528Hz", "639Hz", "741Hz", "852Hz", "963Hz"];

        // Real Video IDs to cycle through
        const musicIDs = ["vH9S8S4Y4_8", "m7bc3f7Kth8", "0nap87_pPFE", "K1xatEInAAs", "CevxZvSJLk8", "3pMvGvJ3T3s", "vRXZj0DzXIA", "B9C0a256mSg"];
        const laughIDs = ["nXpB1jWCCjc", "3p4yU7W-i_U", "70L6_OFrZ_M", "w3W8Zf2X4O0", "8f_fSj8H970"];

        function buildUniqueHub() {
            const mList = document.getElementById('melody-list');
            const lList = document.getElementById('laughter-list');

            // Generate 2000 Unique Music Rows
            for(let i=1; i<=2000; i++) {
                let star = stars[i % stars.length];
                let style = styles[(i + 3) % styles.length];
                let hz = hertz[(i + 7) % hertz.length];
                let vidId = musicIDs[i % musicIDs.length];

                let row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <div class="info"><b>${star}</b> ${style} • ${hz}</div>
                    <button class="play-btn" onclick="runPlayer('${vidId}')">▶ PLAY</button>
                `;
                mList.appendChild(row);
            }

            // Generate 1000 Unique Laughter Rows
            for(let i=1; i<=1000; i++) {
                let vidId = laughIDs[i % laughIDs.length];
                let row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <div class="info"><b>Precious Laughter</b> Global Joy Episode #${i+100}</div>
                    <button class="play-btn meme" onclick="runPlayer('${vidId}')">👀 WATCH</button>
                `;
                lList.appendChild(row);
            }
        }

        function runPlayer(id) {
            const player = document.getElementById('main-player');
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = buildUniqueHub;
    </script>
</body>
</html>

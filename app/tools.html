<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Global Sanctuary</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; --yoga: #4caf50; --meme: #ff5e5e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 100px; color: #333; }
        .wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        h1 { text-align: center; color: var(--p); font-family: serif; font-size: 2rem; margin: 10px 0; }
        
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--p); }
        h2 { font-size: 1rem; color: var(--p); border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-bottom: 12px; }
        
        .scroll-area { height: 350px; overflow-y: auto; background: #fafafa; border-radius: 12px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .info { flex: 1; padding-right: 10px; }
        .info b { color: var(--p); display: block; font-size: 0.9rem; }
        .info span { font-size: 0.7rem; color: #888; font-weight: bold; }
        .info p { margin: 4px 0 0; font-size: 0.8rem; font-style: italic; color: #555; }
        
        .btn { text-decoration: none; padding: 8px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; color: white; white-space: nowrap; }
        .btn-p { background: var(--p); }
        .btn-y { background: var(--yoga); }
        .btn-m { background: var(--meme); }
        
        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Sunshine Beam</h1>

    <div class="card">
        <h2>🎶 Healing Songs (153 Countries)</h2>
        <div class="scroll-area" id="song-list"></div>
    </div>

    <div class="card">
        <h2>🌟 Celebrity Wisdom & Sayings</h2>
        <div class="scroll-area" id="wisdom-list"></div>
    </div>

    <div class="card" style="border-color: var(--yoga);">
        <h2>🧘 Yoga for Stability</h2>
        <div class="scroll-area" id="yoga-list"></div>
    </div>

    <div class="card" style="border-color: var(--meme);">
        <h2>😂 Laughter & Memes (200+)</h2>
        <div class="scroll-area" id="meme-list"></div>
    </div>
</div>

<nav>
    <a href="index.html" style="text-decoration:none;">🏠</a>
    <a href="tools.html" style="font-size:1.8rem; text-decoration:none;">🌞</a>
    <a href="profile.html" style="text-decoration:none;">👤</a>
</nav>

<script>
    const kCelebs = ["Jin (BTS)", "IU", "RM (BTS)", "Stray Kids", "Jimin", "Suga", "V (BTS)", "J-Hope"];
    const lCelebs = ["Monika Liu", "The Roop", "Donny Montell", "Jurijus", "GJan", "Vydūnas", "Basanavičius"];
    const quotes = [
        "You are the one you should love.",
        "Soul light heals the mind.",
        "Take your time, you are doing fine.",
        "Speak yourself, no matter who you are.",
        "Sentimentality is a strength.",
        "Everything goes, just keep walking."
    ];

    window.onload = function() {
        const sContainer = document.getElementById('song-list');
        const wContainer = document.getElementById('wisdom-list');
        const yContainer = document.getElementById('yoga-list');
        const mContainer = document.getElementById('meme-list');

        // Generate 153 Songs
        let sHtml = "";
        for(let i=1; i<=153; i++) {
            let name = (i % 2 === 0) ? kCelebs[i % kCelebs.length] : lCelebs[i % lCelebs.length];
            let country = (i % 2 === 0) ? "Korea" : "Lithuania";
            sHtml += `<div class="row"><div class="info"><span>${country}</span><b>${name}</b>Healing Melody #${i}</div><a href="https://www.youtube.com/results?search_query=${name}+healing+song" target="_blank" class="btn btn-p">PLAY</a></div>`;
        }
        sContainer.innerHTML = sHtml;

        // Generate Wisdom
        let wHtml = "";
        for(let i=1; i<=100; i++) {
            let name = (i % 2 === 0) ? kCelebs[i % kCelebs.length] : lCelebs[i % lCelebs.length];
            let say = quotes[i % quotes.length];
            wHtml += `<div class="row"><div class="info"><b>${name}</b><p>"${say}"</p></div><a href="https://www.google.com/search?q=${name}+motivational+quotes" target="_blank" class="btn btn-p">READ</a></div>`;
        }
        wContainer.innerHTML = wHtml;

        // Generate 50 Yoga
        let yHtml = "";
        for(let i=1; i<=50; i++) {
            yHtml += `<div class="row"><div class="info"><b>Stability Yoga</b>Flow #${i}</div><a href="https://www.youtube.com/results?search_query=yoga+for+mental+balance" target="_blank" class="btn btn-y">START</a></div>`;
        }
        yContainer.innerHTML = yHtml;

        // Generate 200+ Memes
        let mHtml = "";
        for(let i=1; i<=210; i++) {
            mHtml += `<div class="row"><div class="info"><b>Pure Joy</b>Wholesome Meme #${i}</div><a href="https://www.youtube.com/results?search_query=wholesome+memes+shorts+clean" target="_blank" class="btn btn-m">WATCH</a></div>`;
        }
        mContainer.innerHTML = mHtml;
    };
</script>

</body>
</html>

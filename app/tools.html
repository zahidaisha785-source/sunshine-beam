<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Global Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 100px; }
        .wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        h1 { text-align: center; color: var(--p); font-family: serif; font-size: 2rem; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--p); font-size: 1rem; border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-bottom: 15px; }
        
        .list-box { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
        .info { font-size: 0.8rem; line-height: 1.4; }
        .info b { display: block; color: var(--p); font-size: 0.9rem; }
        .info span { color: #888; font-size: 0.7rem; font-weight: bold; }
        
        .btn { background: var(--p); color: white; text-decoration: none; padding: 10px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .btn:active { background: var(--gold); }
        
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Sunshine Beam</h1>

    <div class="card">
        <h2>🎶 Global Healing Melody</h2>
        <div class="list-box" id="melody-list">
            </div>
    </div>

    <div class="card">
        <h2>🌟 World Wisdom</h2>
        <div class="list-box" id="wisdom-list">
            </div>
    </div>
</div>

<nav>
    <a href="index.html" style="text-decoration:none;">🏠</a>
    <a href="tools.html" style="font-size:2rem; text-decoration:none;">🌞</a>
    <a href="profile.html" style="text-decoration:none;">👤</a>
</nav>

<script>
    const korea = ["BTS", "IU", "Seventeen", "Stray Kids", "NewJeans", "Blackpink", "Jin", "RM"];
    const lithuania = ["The Roop", "Monika Liu", "Donny Montell", "Vaidas Baumila", "GJan", "Jurijus"];
    const global = ["USA", "India", "UK", "Nigeria", "Brazil", "Japan", "France", "Germany", "Spain", "Italy"];

    function populate() {
        const mList = document.getElementById('melody-list');
        const wList = document.getElementById('wisdom-list');
        
        let htmlMusic = "";
        let htmlWisdom = "";

        // Generate 500 items (enough for variety, small enough to be fast)
        for(let i=1; i<=500; i++) {
            let country, artist;
            
            if (i % 3 === 0) {
                country = "South Korea";
                artist = korea[i % korea.length];
            } else if (i % 3 === 1) {
                country = "Lithuania";
                artist = lithuania[i % lithuania.length];
            } else {
                country = global[i % global.length];
                artist = "Top Global Artist";
            }

            let searchM = `${artist} ${country} healing song ${i}`;
            let searchW = `${artist} ${country} motivational quotes wisdom`;

            htmlMusic += `
                <div class="item">
                    <div class="info"><span>🌏 ${country}</span><b>${artist}</b>Healing Melody #${i}</div>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(searchM)}" target="_blank" class="btn">PLAY</a>
                </div>`;

            htmlWisdom += `
                <div class="item">
                    <div class="info"><span>⭐ ${country}</span><b>${artist} Wisdom</b>Inspiration #${i}</div>
                    <a href="https://www.google.com/search?q=${encodeURIComponent(searchW)}" target="_blank" class="btn">READ</a>
                </div>`;
        }
        
        mList.innerHTML = htmlMusic;
        wList.innerHTML = htmlWisdom;
    }

    window.onload = populate;
</script>

</body>
</html>

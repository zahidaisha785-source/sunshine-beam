<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - Mental Healing Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; --accent: #4caf50; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding-bottom: 110px; color: #333; }
        .wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        header { text-align: center; padding: 20px 0; }
        header h1 { color: var(--p); font-family: serif; font-size: 2.4rem; margin: 0; }
        header p { font-size: 0.9rem; color: #666; margin-top: 5px; }

        .card { background: white; border-radius: 25px; padding: 18px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 6px solid var(--p); }
        h2 { font-size: 1.1rem; color: var(--p); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Scrollable Section Control */
        .scroll-container { height: 320px; overflow-y: auto; padding-right: 5px; scrollbar-width: thin; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; transition: 0.3s; }
        .row:hover { border-color: var(--p); background: #fff; }

        .info { flex: 1; padding-right: 10px; }
        .info b { display: block; color: var(--p); font-size: 0.95rem; }
        .info span { font-size: 0.75rem; color: #777; font-weight: 600; }
        .info p { margin: 3px 0 0; font-size: 0.8rem; font-style: italic; color: #555; }

        /* Action Buttons */
        .btn { text-decoration: none; padding: 10px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: white; text-align: center; min-width: 70px; }
        .btn-music { background: var(--p); }
        .btn-wisdom { background: var(--gold); color: #444; }
        .btn-meme { background: #ff5e5e; }
        .btn-yoga { background: var(--accent); }
        .btn:active { transform: scale(0.9); }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: white; height: 70px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 1000; }
        .nav-active { background: var(--gold); width: 60px; height: 60px; border-radius: 50%; margin-top: -40px; border: 5px solid white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Sunshine Beam</h1>
        <p>Your mental stability sanctuary</p>
    </header>

    <div class="card">
        <h2>🎶 Healing Melodies (Global)</h2>
        <div class="scroll-container" id="music-list"></div>
    </div>

    <div class="card">
        <h2>🌟 Celebrity Wisdom & Sayings</h2>
        <div class="scroll-container" id="wisdom-list"></div>
    </div>

    <div class="card">
        <h2>😂 Precious Laughter (Memes)</h2>
        <div class="scroll-container" id="meme-list"></div>
    </div>

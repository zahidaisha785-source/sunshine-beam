<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healing Hub</title>
    <style>
        :root { --p: #6a4c93; --gold: #FFD700; --bg: #f3e8ff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 100px; }
        .wrapper { max-width: 500px; margin: 0 auto; padding: 15px; }
        h1 { text-align: center; color: var(--p); font-family: serif; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--p); font-size: 1.1rem; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        
        /* Fixed Scroll Boxes */
        .box { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .info { font-size: 0.85rem; color: #333; line-height: 1.3; }
        .info b { color: var(--p); display: block; }
        
        /* Big Easy Buttons */
        .btn { background: var(--p); color: white; border: none; padding: 10px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 0.75rem; }
        .btn:active { background: var(--gold); }
        .btn-red { background: #ff5e5e; }

        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; height: 65px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Sunshine Beam</h1>

    <div class="card">
        <h2>🎶 Healing Melody (Global)</h2>
        <div class="box" id="m-list"></div>
    </div>

    <div class="card">
        <h2>🌟 Celebrity Wisdom</h2>
        <div class="box" id="w-list"></div>
    </div>

    <div class="card">
        <h2>😂 Precious Laughter</h2>
        <div class="box" id="l-list"></div>
    </div>
</div>

<nav>
    <a href="index.html" style="text-decoration:none;">🏠</a>
    <a href="tools.html" style="font-size:2rem; text-decoration:none;">🌞</a>
    <a href="profile.html" style="text-decoration:none;">👤</a>
</nav>

<script>
    const artists = ["BTS", "IU", "Seventeen", "Coldplay", "Stray Kids", "Taylor Swift", "Imagine Dragons", "NewJeans"];
    const moods = ["Healing song", "Motivational anthem", "Zen melody", "Self love song", "Positive vibe"];
    const celebs = [
        {n: "RM (BTS)", q: "“Speak yourself.”"},
        {n: "Jin (BTS)", q: "“I am the one I should love.”"},
        {n: "Oprah", q: "“Turn wounds to wisdom.”"},
        {n: "IU", q: "“Love poem for you.”"}
    ];

    function start() {
        const m = document.getElementById('m-list');
        const w = document.getElementById('w-list');
        const l = document.getElementById('l-list');

        // 500 Unique Global Songs
        for(let i=1; i<=500; i++) {
            let art = artists[i % artists.length];
            let md = moods[i % moods.length];
            let search = `${art} ${md} ${i}`;
            m.innerHTML += `<div class="row"><div class="info"><b>${art}</b>${md}</div><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(search)}" target="_blank" class="btn">OPEN</a></div>`;
        }

        // Wisdom
        for(let i=1; i<=100; i++) {
            let c = celebs[i % celebs.length];
            w.innerHTML += `<div class="row"><div class="info"><b>${c.n}</b>${c.q}</div><a href="https://www.google.com/search?q=${encodeURIComponent(c.n + ' quotes')}" target="_blank" class="btn">READ</a></div>`;
        }

        // Laughter
        for(let i=1; i<=300; i++) {
            let search = `funny wholesome shorts ${i}`;
            l.innerHTML += `<div class="row"><div class="info"><b>Video Meme</b>Joy #${i}</div><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(search)}" target="_blank" class="btn btn-red">WATCH</a></div>`;
        }
    }
    window.onload = start;
</script>

</body>
</html>

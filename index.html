<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Beam - UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-purple: #6a4c93; /* Main title purple */
            --card-purple: #f3e8ff; /* Card border/background faint purple */
            --button-purple: #a684d0; /* Purple used for buttons */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* 1. APPLY MAIN BACKGROUND ASSET HERE */
            background-image: url('main_background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Ensures flowers stay as cards scroll */
            min-height: 100vh;
            color: #555;
            padding-bottom: 80px; /* Space for fixed navigation bar */
        }

        /* Use Flexbox for a clean main structure */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* HEADER SECTION */
        .app-header {
            text-align: center;
            margin-top: 40px; /* Space from top controls */
            margin-bottom: 20px;
        }

        .main-title {
            font-family: 'Dancing Script', cursive; /* Use a script font */
            color: var(--ui-purple);
            font-size: 3.5rem;
            margin: 10px 0;
        }

        /* 2. ADD SUN ICON & FLOWERS Swashes ASSESTS HERE */
        /* Placeholder for sun: <img src="sun_icon.png" width="60"> */

        /* GENERAL CARD STYLING */
        .card {
            background-color: rgba(255, 255, 255, 0.85); /* Slightly transparent white */
            border: 1.5px solid var(--card-purple);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(106, 76, 147, 0.1);
        }

        .card h2 {
            font-size: 1.1rem;
            color: var(--ui-purple);
            margin-bottom: 5px;
        }

        /* 3. ASSEMBLE "GOOD MORNING" CARD WITH JAR ASSET */
        /* Use CSS Grid/Flex for layout: 
           Text (Left) | Jar Asset (Right) */

        /* 4. ASSEMBLE "HOW ARE YOU" MOOD STRIP */
        /* Use CSS Flexbox: `display: flex; justify-content: center; gap: 10px;` 
           Ensure each icon image is clickable. */

        /* 5. SPLIT THE JOURNAL AND AFFIRMATION INTO SIDE-BY-SIDE CARDS */
        /* Place these within a wrapper div: `display: flex; gap: 15px;` */

        /* 6. FIXED BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            border-top: 2px solid var(--card-purple);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            width: 20%;
            color: var(--ui-purple);
        }

        /* Generate the special center 'Sunshine Beam' style in CSS */
        .nav-center {
            /* style this to be raised and highlighted */
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="app-header">
            <div class="main-title">Sunshine Beam</div>
            <p>Small steps. Brighter days. You’re not alone. 💜</p>
        </div>

        <div style="display: flex; gap: 15px;">
            </div>

        </div>

    <div class="bottom-nav">
        </div>

</body>
</html>

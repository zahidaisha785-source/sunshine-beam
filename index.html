<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunshine Beam</title>

  <style>
    :root {
      --lilac-light: #F3E8FF;
      --lilac-dark: #E6D6F2;
      --purple-text: #6a4c93;
      --accent: #C8A2C8;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(var(--lilac-light), var(--lilac-dark));
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
    }

    /* 🌼 Header with sunshine glow */
    .header {
      padding: 50px 20px;
      background: radial-gradient(circle at top, #FFF5CC, transparent 70%),
                  linear-gradient(var(--lilac-light), var(--lilac-dark));
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    h1 {
      color: var(--purple-text);
      margin: 0;
      font-size: 36px;
    }

    .subtitle {
      color: #666;
      font-style: italic;
      margin-top: 5px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 85%;
    }

    /* Mood Buttons */
    .moods {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

    .moods button {
      font-size: 24px;
      padding: 15px;
      border: none;
      border-radius: 50%;
      background: var(--lilac-light);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .moods button:hover {
      transform: scale(1.1);
      background: #dfc8f0;
    }

    #message {
      margin-top: 15px;
      color: var(--purple-text);
      font-weight: bold;
      min-height: 24px;
    }

    /* Journal Area */
    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 12px;
      box-sizing: border-box;
      font-family: inherit;
      resize: none;
      margin-top: 10px;
    }

    .btn {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    /* 🌸 Performance-optimized floating flowers */
    .flower {
      position: fixed;
      top: -50px;
      font-size: 22px;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>🌞 Sunshine Beam</h1>
    <p class="subtitle">Small steps. Brighter days. You’re not alone 💜</p>
  </div>

  <div class="card">
    <h3>How are you feeling?</h3>
    <div class="moods">
      <button onclick="showMessage('You are doing great 💛')" aria-label="Happy">😊</button>
      <button onclick="showMessage('It’s okay. Take it slow 🌿')" aria-label="Okay">🙂</button>
      <button onclick="showMessage('You are not alone 💜')" aria-label="Sad">😔</button>
      <button onclick="showMessage('Breathe. You’ll get through this 🌸')" aria-label="Stressed">😣</button>
    </div>
    <p id="message">Select your mood</p>
  </div>

  <div class="card">
    <h3>Journal</h3>
    <textarea id="journalInput" placeholder="What's on your mind?"></textarea>
    <button class="btn" onclick="saveEntry()">Save My Thoughts</button>
    <p id="saveStatus" style="font-size: 12px; color: green; margin-top: 5px;"></p>
  </div>

  <div class="card">
    <h3>Daily Affirmation</h3>
    <p style="line-height: 1.6; color: #555;">
      <strong>I am healing</strong><br>
      <strong>I am growing</strong><br>
      <strong>I am enough 💜</strong>
    </p>
  </div>

<script>
  // Show mood message
  function showMessage(text) {
    document.getElementById("message").innerText = text;
  }

  // Save Journal to LocalStorage
  function saveEntry() {
    const text = document.getElementById("journalInput").value;
    const status = document.getElementById("saveStatus");
    
    if (text.trim() !== "") {
      localStorage.setItem("sunshine_journal", text);
      status.innerText = "Saved successfully! ✨";
      setTimeout(() => status.innerText = "", 3000);
    } else {
      alert("Please write something first.");
    }
  }

  // Load Journal on startup
  window.onload = () => {
    const savedText = localStorage.getItem("sunshine_journal");
    if (savedText) {
      document.getElementById("journalInput").value = savedText;
    }
  };

  // Improved Flower Particle System
  function createFlower() {
    const flower = document.createElement("div");
    flower.className = "flower";
    
    const varieties = ["🌸", "🌼", "🌺", "🌷", "✨"];
    flower.innerText = varieties[Math.floor(Math.random() * varieties.length)];

    flower.style.left = Math.random() * 100 + "vw";
    // Randomize size and speed
    const duration = (Math.random() * 5 + 5); 
    flower.style.animationDuration = duration + "s";
    flower.style.opacity = Math.random() * 0.5 + 0.5;
    flower.style.fontSize = (Math.random() * 10 + 15) + "px";

    document.body.appendChild(flower);

    // Clean up to prevent memory leaks
    setTimeout(() => {
      flower.remove();
    }, duration * 1000);
  }

  // Generate a flower every 800ms (balanced for performance)
  setInterval(createFlower, 800);
</script>

</body>
</html>

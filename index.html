<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunshine Beam</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-dark: #6a4c93;
      --p-mid: #a684d0;
      --p-light: #f3e8ff;
      --glass: rgba(255, 255, 255, 0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #fff9e6 0%, #f3e8ff 40%, #e6d6f2 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      padding: 15px;
      position: relative;
      z-index: 2;
    }

    /* --- Language Switcher --- */
    .lang-bar {
      text-align: right;
      padding: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--p-dark);
    }
    .lang-bar span { cursor: pointer; margin-left: 10px; }

    /* --- Header --- */
    header { text-align: center; margin: 10px 0; }
    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: var(--p-dark);
      margin: 0;
    }
    .tagline { font-size: 0.8rem; color: #666; font-weight: 500; }

    /* --- Cards --- */
    .card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 8px 30px rgba(106, 76, 147, 0.12);
    }

    h3 { font-size: 0.95rem; color: var(--p-dark); margin: 0 0 10px 0; }

    /* Moods */
    .mood-box { display: flex; justify-content: space-between; gap: 5px; }
    .mood-btn { text-align: center; cursor: pointer; flex: 1; }
    .mood-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin: 0 auto 5px;
      transition: 0.3s;
    }
    .mood-btn.selected .mood-icon {
      transform: scale(1.1);
      border: 2px solid var(--p-dark);
      background: white !important;
    }
    .mood-label { font-size: 0.65rem; color: #777; }

    /* Community Feed */
    #posts-container {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 10px;
    }
    .post-item {
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(106, 76, 147, 0.1);
      padding: 5px 0;
    }

    /* Form Elements */
    textarea, input {
      width: 100%; border: none; 
      background: rgba(255,255,255,0.5);
      border-radius: 12px; padding: 10px;
      font-family: inherit; font-size: 0.8rem;
    }
    textarea { height: 60px; resize: none; }

    .btn {
      background: var(--p-mid); color: white;
      border: none; padding: 10px; border-radius: 15px;
      width: 100%; margin-top: 8px; font-size: 0.8rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-crisis { background: #ffb3ba; color: #900; }

    /* Navigation & Spacing */
    .bottom-spacer { height: 110px; }
    nav {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%); width: 90%; max-width: 400px;
      background: rgba(255, 255, 255, 0.95); height: 70px;
      border-radius: 40px; display: flex;
      justify-content: space-around; align-items: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 1000;
    }
    .nav-center {
      background: var(--p-light); width: 60px; height: 60px;
      border-radius: 50%; margin-top: -40px; border: 5px solid white;
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
    }

    /* Flowers */
    .flower {
      position: fixed; top: -50px; pointer-events: none; z-index: 1;
      animation: fall linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="lang-bar">
      <span onclick="setLanguage('en')">EN</span>
      <span onclick="setLanguage('ko')">KR</span>
      <span onclick="setLanguage('lt')">LT</span>
    </div>

    <header>
      <div style="font-size: 40px;">🌞</div>
      <h1 id="app-title">Sunshine Beam</h1>
      <p id="tagline" class="tagline">Small steps. Brighter days. 💜</p>
    </header>

    <div id="profile-card" class="card">
      <h3 id="profile-title">Who are you today?</h3>
      <input type="text" id="alias-input" placeholder="Enter nickname...">
      <button class="btn" onclick="saveProfile()">Start Journey</button>
    </div>

    <div id="main-content" style="display:none;">
      <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h3 id="greeting">Good morning! 🌸</h3>
          <button id="crisis-btn" class="btn btn-crisis" onclick="showHelp()">Get Help</button>
        </div>
        <div style="font-size: 45px;">🍯</div>
      </div>

      <div class="card">
        <h3 id="mood-q">How are you feeling?</h3>
        <div class="mood-box">
          <div class="mood-btn" onclick="selectMood(this, 'Happy')"><div class="mood-icon" style="background:#FFF5CC">😊</div><div class="mood-label">Happy</div></div>
          <div class="mood-btn" onclick="selectMood(this, 'Okay')"><div class="mood-icon" style="background:#FFE8E8">🙂</div><div class="mood-label">Okay</div></div>
          <div class="mood-btn" onclick="selectMood(this, 'Low')"><div class="mood-icon" style="background:#E8E8FF">😔</div><div class="mood-label">Low</div></div>
          <div class="mood-btn" onclick="selectMood(this, 'Stressed')"><div class="mood-icon" style="background:#F3E8FF">😫</div><div class="mood-label">Stress</div></div>
        </div>
      </div>

      <div class="card">
        <h3 id="comm-title">Community Sunshine 🌸</h3>
        <div id="posts-container"></div>
        <textarea id="share-input" placeholder="Share a positive thought..."></textarea>
        <button class="btn" id="share-btn" onclick="postToCommunity()">Share</button>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <nav>
    <div style="font-size: 1.3rem; color: var(--p-dark);">🏠</div>
    <div style="font-size: 1.3rem; color: #ccc;">📓</div>
    <div class="nav-center">🌞</div>
    <div style="font-size: 1.3rem; color: #ccc;">🌱</div>
    <div style="font-size: 1.3rem; color: #ccc;">👤</div>
  </nav>

  <script>
    const langData = {
      en: {
        title: "Sunshine Beam", tagline: "Small steps. Brighter days. 💜", 
        profile: "Who are you today?", alias: "Enter nickname...", 
        greeting: "Good morning! 🌸", moodQ: "How are you feeling?", 
        comm: "Community Sunshine 🌸", share: "Share", help: "Get Help",
        crisisMsg: "You matter. Please call 988 (US), 1393 (KR), or 8 800 28888 (LT)."
      },
      ko: {
        title: "햇살 한 줄기", tagline: "작은 발걸음. 더 밝은 나날들. 💜", 
        profile: "당신은 누구신가요?", alias: "닉네임을 입력하세요...", 
        greeting: "좋은 아침이에요! 🌸", moodQ: "기분이 어떠신가요?", 
        comm: "우리들의 햇살 🌸", share: "공유하기", help: "도움 요청",
        crisisMsg: "당신은 소중합니다. 1393으로 전화주세요."
      },
      lt: {
        title: "Saulės Spindulys", tagline: "Maži žingsneliai. Šviesesnės dienos. 💜", 
        profile: "Kas tu šiandien?", alias: "Įveskite slapyvardį...", 
        greeting: "Labas rytas! 🌸", moodQ: "Kaip jautiesi?", 
        comm: "Bendruomenės šviesa 🌸", share: "Dalintis", help: "Pagalba",
        crisisMsg: "Tu esi svarbus. Skambinkite 8 800 28888."
      }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      const d = langData[lang];
      document.getElementById('app-title').innerText = d.title;
      document.getElementById('tagline').innerText = d.tagline;
      document.getElementById('profile-title').innerText = d.profile;
      document.getElementById('alias-input').placeholder = d.alias;
      document.getElementById('greeting').innerText = d.greeting;
      document.getElementById('mood-q').innerText = d.moodQ;
      document.getElementById('comm-title').innerText = d.comm;
      document.getElementById('share-btn').innerText = d.share;
      document.getElementById('crisis-btn').innerText = d.help;
    }

    function saveProfile() {
      const alias = document.getElementById('alias-input').value;
      if (alias) {
        localStorage.setItem('alias', alias);
        checkUser();
      }
    }

    function checkUser() {
      const alias = localStorage.getItem('alias');
      if (alias) {
        document.getElementById('profile-card').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      }
    }

    function postToCommunity() {
      const input = document.getElementById('share-input');
      const container = document.getElementById('posts-container');
      const alias = localStorage.getItem('alias') || "User";
      if (input.value.trim()) {
        const p = document.createElement('div');
        p.className = 'post-item';
        p.innerHTML = `<b>@${alias}:</b> ${input.value}`;
        container.prepend(p);
        input.value = "";
      }
    }

    function selectMood(el) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
    }

    function showHelp() {
      alert(langData[currentLang].crisisMsg);
    }

    function spawnFlower() {
      const f = document.createElement('div');
      f.className = 'flower';
      f.innerText = ['🌸', '🌼', '🌿', '✨'][Math.floor(Math.random()*4)];
      f.style.left = Math.random() * 100 + 'vw';
      const d = Math.random() * 5 + 5;
      f.style.animationDuration = d + 's';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), d * 1000);
    }

    window.onload = () => {
      setLanguage(currentLang);
      checkUser();
      setInterval(spawnFlower, 1000);
    };
  </script>
</body>
</html>

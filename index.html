<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunshine Beam</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-dark: #6a4c93;
      --p-mid: #a684d0;
      --p-light: #f3e8ff;
      --glass: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #fff9e6 0%, #f3e8ff 40%, #e6d6f2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    /* This wrapper allows scrolling while keeping the nav fixed */
    .app-wrapper {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      padding-bottom: 120px; /* EXTRA SPACE so buttons aren't hidden by nav */
      position: relative;
      z-index: 1;
    }

    /* --- Floating Flowers --- */
    .flower {
      position: fixed;
      top: -50px;
      pointer-events: none;
      z-index: 0;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

    header {
      text-align: center;
      margin: 20px 0 15px;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: var(--p-dark);
      margin: 0;
    }

    .tagline { font-size: 0.85rem; color: #777; margin-top: 2px; }

    /* --- Cards --- */
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 8px 25px rgba(106, 76, 147, 0.08);
    }

    .card-row { display: flex; justify-content: space-between; align-items: center; }

    h3 { font-size: 0.95rem; color: var(--p-dark); margin: 0 0 8px 0; }

    /* --- Moods --- */
    .mood-box { display: flex; justify-content: space-between; gap: 5px; margin-top: 10px; }

    .mood-btn { text-align: center; cursor: pointer; flex: 1; }

    .mood-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      margin: 0 auto 5px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .mood-btn.selected .mood-icon {
      transform: scale(1.15);
      border-color: var(--p-dark);
      background: white !important;
    }

    .mood-label { font-size: 0.65rem; color: #888; }

    /* --- Grid Section --- */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 60px;
      border: none;
      background: rgba(255,255,255,0.5);
      border-radius: 10px;
      padding: 8px;
      font-family: inherit;
      font-size: 0.75rem;
      resize: none;
    }

    .btn {
      background: var(--p-mid);
      color: white;
      border: none;
      padding: 8px;
      border-radius: 10px;
      width: 100%;
      margin-top: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 600;
    }

    /* --- Fixed Bottom Nav --- */
    nav {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 400px;
      background: white;
      height: 65px;
      border-radius: 35px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      z-index: 1000;
    }

    .nav-item { font-size: 1.1rem; color: #ccc; text-align: center; }
    .nav-item.active { color: var(--p-dark); }

    .nav-center {
      background: var(--p-light);
      width: 55px;
      height: 55px;
      border-radius: 50%;
      margin-top: -35px;
      border: 4px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--p-dark);
      font-size: 1.6rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header>
      <div style="font-size: 35px;">🌞</div>
      <h1>Sunshine Beam</h1>
      <p class="tagline">Small steps. Brighter days. 💜</p>
    </header>

    <div class="card card-row">
      <div>
        <h3 id="greeting">Good morning! 🌸</h3>
        <p style="font-size: 0.75rem; margin: 0; color: #666;">You are enough.<br>Take a gentle step today.</p>
      </div>
      <div style="font-size: 35px;">🍯</div>
    </div>

    <div class="card">
      <h3>How are you today?</h3>
      <div class="mood-box">
        <div class="mood-btn" onclick="setMood(this, 'Happy')"><div class="mood-icon" style="background:#FFF5CC">😊</div><div class="mood-label">Happy</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Okay')"><div class="mood-icon" style="background:#FFE8E8">🙂</div><div class="mood-label">Okay</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Low')"><div class="mood-icon" style="background:#E8E8FF">😔</div><div class="mood-label">Low</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Stressed')"><div class="mood-icon" style="background:#F3E8FF">😫</div><div class="mood-label">Stress</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Overwhelmed')"><div class="mood-icon" style="background:#E8F5FF">😢</div><div class="mood-label">Sad</div></div>
      </div>
    </div>

    <div class="grid-container">
      <div class="card">
        <h3>Journal</h3>
        <textarea id="journalInput" placeholder="Thoughts..."></textarea>
        <button class="btn" onclick="saveJournal()">Save</button>
      </div>
      <div class="card">
        <h3>Affirmation</h3>
        <p id="affirmation-text" style="font-size: 0.7rem; text-align: center; line-height: 1.3;">I am healing<br>I am growing<br>I am loved 💜</p>
        <button class="btn" style="background: rgba(106,76,147,0.1); color: var(--p-dark);" onclick="newAffirmation()">New</button>
      </div>
    </div>
  </div>

  <nav>
    <div class="nav-item active">🏠</div>
    <div class="nav-item">📓</div>
    <div class="nav-center">🌞</div>
    <div class="nav-item">🌱</div>
    <div class="nav-item">👤</div>
  </nav>

  <script>
    function saveJournal() {
      const text = document.getElementById('journalInput').value;
      if (text.trim() !== "") {
        localStorage.setItem('sunshine_journal', text);
        alert('Saved! 💜');
      }
    }

    function setMood(element, mood) {
      document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
      element.classList.add('selected');
      localStorage.setItem('sunshine_mood', mood);
    }

    function newAffirmation() {
      const affirmations = [
        "I am healing<br>and growing 💜",
        "Small steps<br>matter 🌿",
        "I deserve<br>peace 🌸",
        "I am doing<br>my best ✨"
      ];
      document.getElementById('affirmation-text').innerHTML = affirmations[Math.floor(Math.random() * affirmations.length)];
    }

    window.onload = () => {
      const savedJournal = localStorage.getItem('sunshine_journal');
      if (savedJournal) document.getElementById('journalInput').value = savedJournal;

      const savedMood = localStorage.getItem('sunshine_mood');
      if (savedMood) {
        document.querySelectorAll('.mood-btn').forEach(btn => {
          if (btn.innerText.includes(savedMood)) btn.classList.add('selected');
        });
      }
    };

    function spawnFlower() {
      const flower = document.createElement('div');
      flower.className = 'flower';
      const types = ['🌸', '🌼', '🌿', '✨'];
      flower.innerText = types[Math.floor(Math.random() * types.length)];
      flower.style.left = Math.random() * 100 + 'vw';
      const dur = Math.random() * 5 + 5;
      flower.style.animationDuration = dur + 's';
      flower.style.opacity = Math.random() * 0.4 + 0.2;
      document.body.appendChild(flower);
      setTimeout(() => flower.remove(), dur * 1000);
    }
    setInterval(spawnFlower, 1000);
  </script>

</body>
</html>

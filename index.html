<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunshine Beam</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-dark: #6a4c93;
      --p-mid: #a684d0;
      --p-light: #f3e8ff;
      --glass: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #fff9e6 0%, #f3e8ff 40%, #e6d6f2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      padding: 15px;
      position: relative;
      z-index: 1;
    }

    /* --- Header --- */
    header {
      text-align: center;
      margin: 15px 0 10px;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.8rem; /* Slightly smaller to save space */
      color: var(--p-dark);
      margin: 0;
    }

    .tagline { font-size: 0.8rem; color: #777; }

    /* --- Cards --- */
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 8px 25px rgba(106, 76, 147, 0.08);
    }

    .card-row { display: flex; justify-content: space-between; align-items: center; }

    h3 { font-size: 0.9rem; color: var(--p-dark); margin: 0 0 8px 0; }

    /* --- Moods --- */
    .mood-box { display: flex; justify-content: space-between; gap: 5px; }
    .mood-btn { text-align: center; cursor: pointer; flex: 1; }
    .mood-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; margin: 0 auto 5px;
      transition: all 0.3s ease;
    }
    .mood-btn.selected .mood-icon {
      transform: scale(1.1);
      border: 2px solid var(--p-dark);
      background: white !important;
    }
    .mood-label { font-size: 0.6rem; color: #888; }

    /* --- Grid Section --- */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    textarea {
      width: 100%; height: 50px;
      border: none; background: rgba(255,255,255,0.5);
      border-radius: 10px; padding: 8px;
      font-family: inherit; font-size: 0.7rem; resize: none;
    }

    .btn {
      background: var(--p-mid); color: white;
      border: none; padding: 8px; border-radius: 10px;
      width: 100%; margin-top: 5px; font-size: 0.7rem;
      cursor: pointer; font-weight: 600;
    }

    /* --- THE IMPORTANT FIX --- */
    .bottom-spacer {
      height: 100px; /* This creates invisible space so the nav bar doesn't cover content */
      width: 100%;
    }

    /* --- Fixed Bottom Nav --- */
    nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: white;
      height: 65px;
      border-radius: 35px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      z-index: 1000;
    }

    .nav-center {
      background: var(--p-light);
      width: 55px; height: 55px;
      border-radius: 50%; margin-top: -35px;
      border: 4px solid white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
    }

    /* --- Flowers --- */
    .flower {
      position: fixed; top: -50px; pointer-events: none; z-index: 0;
      animation: fall linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header>
      <div style="font-size: 30px;">🌞</div>
      <h1>Sunshine Beam</h1>
      <p class="tagline">Small steps. Brighter days. 💜</p>
    </header>

    <div class="card card-row">
      <div>
        <h3 id="greeting">Good morning! 🌸</h3>
        <p style="font-size: 0.7rem; margin: 0; color: #666;">You are enough.</p>
      </div>
      <div style="font-size: 30px;">🍯</div>
    </div>

    <div class="card">
      <h3>How are you today?</h3>
      <div class="mood-box">
        <div class="mood-btn" onclick="setMood(this, 'Happy')"><div class="mood-icon" style="background:#FFF5CC">😊</div><div class="mood-label">Happy</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Okay')"><div class="mood-icon" style="background:#FFE8E8">🙂</div><div class="mood-label">Okay</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Low')"><div class="mood-icon" style="background:#E8E8FF">😔</div><div class="mood-label">Low</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Stressed')"><div class="mood-icon" style="background:#F3E8FF">😫</div><div class="mood-label">Stress</div></div>
        <div class="mood-btn" onclick="setMood(this, 'Overwhelmed')"><div class="mood-icon" style="background:#E8F5FF">😢</div><div class="mood-label">Sad</div></div>
      </div>
    </div>

    <div class="grid-container">
      <div class="card">
        <h3>Journal</h3>
        <textarea id="journalInput" placeholder="Thoughts..."></textarea>
        <button class="btn" onclick="saveJournal()">Save</button>
      </div>
      <div class="card">
        <h3>Affirmation</h3>
        <p id="affirmation-text" style="font-size: 0.65rem; text-align: center;">I am healing<br>and growing 💜</p>
        <button class="btn" style="background: rgba(106,76,147,0.1); color: var(--p-dark);" onclick="newAffirmation()">New</button>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <nav>
    <div style="font-size: 1.1rem; color: var(--p-dark);">🏠</div>
    <div style="font-size: 1.1rem; color: #ccc;">📓</div>
    <div class="nav-center">🌞</div>
    <div style="font-size: 1.1rem; color: #ccc;">🌱</div>
    <div style="font-size: 1.1rem; color: #ccc;">👤</div>
  </nav>

  <script>
    function saveJournal() {
      const text = document.getElementById('journalInput').value;
      if (text.trim() !== "") {
        localStorage.setItem('sunshine_journal', text);
        alert('Saved! 💜');
      }
    }

    function setMood(element, mood) {
      document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
      element.classList.add('selected');
      localStorage.setItem('sunshine_mood', mood);
    }

    function newAffirmation() {
      const affirmations = ["I am healing 💜", "Small steps matter 🌿", "I deserve peace 🌸", "I am doing my best ✨"];
      document.getElementById('affirmation-text').innerHTML = affirmations[Math.floor(Math.random() * affirmations.length)];
    }

    function spawnFlower() {
      const flower = document.createElement('div');
      flower.className = 'flower';
      const types = ['🌸', '🌼', '🌿', '✨'];
      flower.innerText = types[Math.floor(Math.random() * types.length)];
      flower.style.left = Math.random() * 100 + 'vw';
      const dur = Math.random() * 5 + 5;
      flower.style.animationDuration = dur + 's';
      flower.style.opacity = Math.random() * 0.4 + 0.2;
      document.body.appendChild(flower);
      setTimeout(() => flower.remove(), dur * 1000);
    }
    setInterval(spawnFlower, 1000);
  </script>

</body>
</html>
